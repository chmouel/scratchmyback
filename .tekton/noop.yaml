---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: demo
  annotations:
    pipelinesascode.tekton.dev/on-target-branch: main
    pipelinesascode.tekton.dev/on-event: pull_request
spec:
  taskRunTemplate:
    serviceAccountName: deployment-manager
  pipelineSpec:
    tasks:
      - name: deploy-nginx
        displayName: Deploy nginx
        taskSpec:
          steps:
            - name: deploy-nginx
              image: bitnami/kubectl:latest
              script: |
                #!/bin/sh
                set -e
                echo "Creating nginx deployment..."
                cat <<EOF | kubectl apply -f -
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: nginx
                spec:
                  replicas: 1
                  selector:
                    matchLabels:
                      app: nginx
                  template:
                    metadata:
                      labels:
                        app: nginx
                    spec:
                      nodeSelector:
                        disk-type: ssd
                        gpu: "true"
                      affinity:
                        podAntiAffinity:
                          requiredDuringSchedulingIgnoredDuringExecution:
                          - labelSelector:
                              matchLabels:
                                app: nginx
                            topologyKey: kubernetes.io/hostname
                      containers:
                      - name: nginx
                        image: nginx:latest
                        resources:
                          requests:
                            memory: "512Gi"
                            cpu: "128"
                EOF

                echo "Waiting for deployment to be ready..."
                kubectl wait --for=condition=available --timeout=5s deployment/nginx
